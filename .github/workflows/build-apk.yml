name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'

      # android/ and ios/ folders are NOT checked into git.
      # flutter create fills in only the missing platform folders
      # and will not touch our existing pubspec.yaml / lib/.
      - name: Scaffold platform folders
        run: flutter create --platforms=android --org com.companion --project-name ai_companion .

      - name: Add required Android permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET" />\n    <application#' "$MANIFEST"
          cat "$MANIFEST"

      - name: Get packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-companion-apk
          path: build/app/outputs/flutter-apk/app-release.apk
